baseURL: "https://joe.stevensen.net/"
locale: "en-us"
title: "Joe Stevensen"
theme: "PaperMod"

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

pagination:
  pagerSize: 5

minify:
  disableXML: true
  minifyOutput: true

outputs:
  home:
    - HTML
    - RSS
    - JSON

taxonomies:
  tag: tags

params:
  env: production
  title: "Joe Stevensen"
  description: "Backpacking, BBQ, and tech notes."
  author: "Joe Stevensen"
  DateFormat: "January 2, 2006"
  defaultTheme: auto
  disableThemeToggle: false

  mainSections:
    - notes

  ShowReadingTime: true
  ShowCodeCopyButtons: true
  ShowBreadCrumbs: true
  ShowToc: true
  TocOpen: false
  ShowPostNavLinks: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableScrollToTop: false

  homeInfoParams:
    Title: "Joe Stevensen"
    Content: "Backpacking, BBQ, and tech notes."

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys:
      - title
      - permalink
      - summary
      - content

menu:
  main:
    - identifier: notes
      name: Notes
      url: /notes/
      weight: 10
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 20
    - identifier: search
      name: Search
      url: /search/
      weight: 30

pygmentsUseClasses: true
markup:
  highlight:
    noClasses: false
