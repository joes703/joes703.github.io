baseURL: "https://joe.stevensen.net/"
title: "Joe Stevensen"
theme: "hugo-book"

enableGitInfo: true
disablePathToLower: true
disableKinds: ["taxonomy", "term"]

markup:
  goldmark:
    renderer:
      unsafe: true
  tableOfContents:
    startLevel: 1
    endLevel: 3

params:
  BookTheme: "auto"
  BookToC: true
  BookSection: "*"
  BookRepo: "https://github.com/joes703/joes703.github.io"
  BookLastChangeLink: "{{ .Site.Params.BookRepo }}/commit/{{ .GitInfo.Hash }}"
  BookDateFormat: "January 2, 2006"
  BookSearch: true
  BookComments: false
