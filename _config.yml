title: Joe Stevensen
description: Backpacking, BBQ, and tech notes.
remote_theme: just-the-docs/just-the-docs

plugins:
  - jekyll-remote-theme

# Apply the theme's default layout to every page (so each page gets the sidebar)
defaults:
  - scope:
      path: ""
    values:
      layout: default

# Just the Docs options
color_scheme: light
search_enabled: true
heading_anchors: true

# Callout boxes you can use in any page, e.g.:
#   {: .warning }
#   > Don't run this in production.
callouts:
  note:
    title: Note
    color: blue
  warning:
    title: Warning
    color: red
